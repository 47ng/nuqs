name: Lint PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read

jobs:
  lint-pr-title:
    name: Lint PR Title
    # Skip merged PRs and body-only edits (we lint titles, not bodies).
    if: >-
      ${{ !github.event.pull_request.merged &&
          (github.event.action != 'edited' || github.event.changes.title.from) }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install scripts dependencies
        run: pnpm install --ignore-scripts --frozen-lockfile --filter scripts
      - name: Get changed files
        id: changed-files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # NUL-delimited from git, then NUL -> newline for $GITHUB_OUTPUT
          # transport. Filenames containing whitespace survive the round trip.
          delim="EOF_$(openssl rand -hex 16)"
          {
            printf 'files<<%s\n' "$delim"
            git diff -z --name-only "$BASE_SHA...$HEAD_SHA" | tr '\0' '\n'
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: ./packages/scripts/validate-pr-title.ts
