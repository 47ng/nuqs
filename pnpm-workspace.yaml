packages:
  - packages/**

catalogs:
  e2e:
    playwright: ^1.58.1
    '@playwright/test': ^1.58.1

  knip:
    knip: ^6.6.2

  vitest:
    vitest: ^4.1.0
    '@vitest/browser-playwright': ^4.1.0
    '@vitest/coverage-v8': ^4.1.0

  vite:
    vite: ^8.0.0

  next:
    next: 16.2.1-canary.3

  react19:
    '@types/react': ^19.2.10
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4

  typescript:
    typescript: ^5.9.2

enablePrePostScripts: true

trustPolicy: no-downgrade

allowBuilds:
  '@swc/core': true
  '@tailwindcss/oxide': true
  playwright: true
  esbuild: true
  sharp: true
  msw: false

# Next.js canary releases must install immediately for the test-against-nextjs
# workflows, which run ~15min after a GitHub release. The 24h minimumReleaseAge
# default would force a fallback to an older version.
minimumReleaseAgeExclude:
  - next
